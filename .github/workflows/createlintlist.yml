'on':
  push:
    branches:
      - master

jobs:
  create_lint_list:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - run: |
          mvn clean
          mvn package -DskipTests
          
          java -jar target/printAll.jar
          
          jar xvf target/printAll.jar /org/eolang/motives/
          
          git init target/org/eolang/motives/
          
          git checkout main
          
          git add /org/eolang/motives/.
          
          git commit -m "test"
          
          git push ${{ github.server_url }}${{ github.event.repository.name }} main:gh-pages
